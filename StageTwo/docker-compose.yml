services:
  db:
    image: postgres:16-alpine
    container_name: bc-postgres
    environment:
      POSTGRES_DB: bc
      POSTGRES_USER: bc
      POSTGRES_PASSWORD: bc
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bc -d bc"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build:
      context: ./BackTestBcWithSpringBoot
      dockerfile: Dockerfile
    container_name: bc-back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bc
      SPRING_DATASOURCE_USERNAME: bc
      SPRING_DATASOURCE_PASSWORD: bc
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./FrontendTestBcWithAngular
      dockerfile: Dockerfile
    container_name: bc-front
    environment:
      PORT: 4200
      BACKEND_URL: http://back:8080
    ports:
      - "4200:4200"
    depends_on:
      - back
